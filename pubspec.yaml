name: eidos
description: "See the hidden. Share the vision."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Drawing
  perfect_freehand: ^2.0.1

  # Image picking
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4

  # Routing
  go_router: ^14.6.2

  # Share & save to gallery
  share_plus: ^10.0.0
  gal: ^2.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
